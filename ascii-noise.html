<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII Noise</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #controls {
    width: 240px;
    min-width: 240px;
    background: #111;
    border-right: 1px solid #222;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #controls h1 {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    padding-bottom: 10px;
    border-bottom: 1px solid #222;
  }

  .group { display: flex; flex-direction: column; gap: 8px; }

  .group-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #555;
  }

  .control { display: flex; flex-direction: column; gap: 3px; }

  .control label {
    font-size: 11px;
    color: #999;
    display: flex;
    justify-content: space-between;
  }

  .control label span { color: #5af; min-width: 36px; text-align: right; }

  input[type=range] {
    width: 100%;
    height: 3px;
    -webkit-appearance: none;
    background: #2a2a2a;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #5af;
    cursor: pointer;
  }

  select, input[type=text], input[type=number] {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 4px 6px;
    width: 100%;
    outline: none;
    border-radius: 2px;
  }

  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }

  select:focus, input[type=text]:focus, input[type=number]:focus { border-color: #5af; }

  .size-row {
    display: flex;
    gap: 6px;
  }

  .size-row .control { flex: 1; }
  .size-row .control label { font-size: 10px; }

  .hex-row { display: flex; align-items: center; gap: 6px; }

  .hex-row input[type=color] {
    -webkit-appearance: none;
    width: 28px; height: 22px;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    padding: 1px;
    background: #1a1a1a;
    cursor: pointer;
    flex-shrink: 0;
  }

  .hex-row input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  .hex-row input[type=color]::-webkit-color-swatch { border: none; border-radius: 1px; }

  .hex-row input[type=text] {
    flex: 1;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: #999;
  }

  .toggle { position: relative; width: 32px; height: 16px; }
  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: #2a2a2a;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    left: 2px; top: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #666;
    transition: transform 0.2s, background 0.2s;
  }

  .toggle input:checked + .toggle-track { background: #1a3a5a; }
  .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: #5af; }

  button {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #999;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 1px;
    width: 100%;
    transition: border-color 0.15s, color 0.15s;
  }

  button:hover { border-color: #5af; color: #5af; }
  button.active { border-color: #5af; color: #5af; }

  .preset-row { display: flex; gap: 4px; flex-wrap: wrap; }

  .preset-btn {
    flex: 1;
    min-width: 0;
    font-size: 9px;
    padding: 4px 2px;
    letter-spacing: 0;
  }

  #btn-export {
    background: #0a1a2a;
    border-color: #5af;
    color: #5af;
    font-size: 12px;
    letter-spacing: 1.5px;
  }
  #btn-export:hover { background: #0d2a3d; }

  #output {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 16px;
    background: #060606;
  }

  #canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    /* canvas naturally holds aspect ratio with these two constraints */
  }

  #drop-zone {
    border: 1px dashed #2a2a2a;
    border-radius: 2px;
    padding: 12px 8px;
    text-align: center;
    font-size: 10px;
    color: #555;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    letter-spacing: 1px;
  }
  #drop-zone:hover, #drop-zone.drag-over { border-color: #5af; color: #5af; }
  #drop-zone.has-image { border-color: #5a5; color: #5a5; }

  /* color noise section accent */
  .group-label.color-label { color: #a55; }
  .group.color-group input[type=range]::-webkit-slider-thumb { background: #f85; }
  .group.color-group .control label span { color: #f85; }

  .fps {
    font-size: 9px;
    color: #333;
    text-align: right;
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid #1a1a1a;
  }
</style>
</head>
<body>

<div id="controls">
  <h1>ASCII Noise</h1>

  <!-- ① CANVAS SIZE — master, everything derives from this -->
  <div class="group">
    <div class="group-label">Canvas</div>
    <div class="size-row">
      <div class="control">
        <label>Width</label>
        <input type="number" id="canvasW" value="1920" min="100" max="7680" step="1">
      </div>
      <div class="control">
        <label>Height</label>
        <input type="number" id="canvasH" value="1080" min="100" max="7680" step="1">
      </div>
    </div>
    <div class="preset-row">
      <button class="preset-btn" data-w="1080" data-h="1080">1:1</button>
      <button class="preset-btn" data-w="1080" data-h="1920">9:16</button>
      <button class="preset-btn" data-w="1920" data-h="1080">16:9</button>
      <button class="preset-btn" data-w="1584" data-h="396">LI</button>
      <button class="preset-btn" data-w="851"  data-h="315">FB</button>
    </div>
  </div>

  <!-- ② GRID -->
  <div class="group">
    <div class="group-label">Grid</div>
    <div class="control">
      <label>Size <span id="v-cellsize">24</span>px</label>
      <input type="range" id="cellsize" min="4" max="120" value="24" step="1">
    </div>
    <div class="control">
      <label>Spacing <span id="v-spacing">4</span>px</label>
      <input type="range" id="spacing" min="0" max="60" value="4" step="1">
    </div>
    <div id="grid-info" style="font-size:10px;color:#444;text-align:right">80 × 45 cells</div>
  </div>

  <!-- ③ FONT -->
  <div class="group">
    <div class="group-label">Font</div>
    <input type="text" id="fontfamily" value="Courier New" placeholder="font name or Google Fonts URL">
    <button id="btn-loadfont">LOAD</button>
    <div id="font-status" style="font-size:10px;color:#555;min-height:14px"></div>
    <div style="font-size:10px;color:#444;line-height:1.5">Name or Google Fonts URL</div>
  </div>

  <!-- ④ NOISE — SHAPE -->
  <div class="group">
    <div class="group-label">Noise — Shape</div>
    <div class="control">
      <label>Scale <span id="v-scale">3.0</span></label>
      <input type="range" id="scale" min="0.5" max="20" value="3" step="0.1">
    </div>
    <div class="control">
      <label>Octaves <span id="v-octaves">4</span></label>
      <input type="range" id="octaves" min="1" max="8" value="4" step="1">
    </div>
    <div class="control">
      <label>Lacunarity <span id="v-lacunarity">2.0</span></label>
      <input type="range" id="lacunarity" min="1.0" max="4.0" value="2.0" step="0.1">
    </div>
    <div class="control">
      <label>Gain <span id="v-gain">0.50</span></label>
      <input type="range" id="gain" min="0.1" max="0.9" value="0.5" step="0.01">
    </div>
    <div class="control">
      <label>Speed <span id="v-speed">0.50</span></label>
      <input type="range" id="speed" min="0" max="3" value="0.5" step="0.01">
    </div>
    <div class="control">
      <label>Flow angle <span id="v-angle">0°</span></label>
      <input type="range" id="angle" min="0" max="360" value="0" step="1">
    </div>
  </div>

  <!-- ⑤ CHARACTERS -->
  <div class="group">
    <div class="group-label">Characters</div>
    <select id="charset-preset">
      <option value="dense">Dense</option>
      <option value="simple">Simple</option>
      <option value="block">Block</option>
      <option value="dots">Dots</option>
      <option value="binary">Binary</option>
      <option value="custom">Custom</option>
    </select>
    <input type="text" id="charset-custom" value="@#S%?*+;:,. " placeholder="dark → light chars">
    <div class="toggle-row">
      Invert
      <label class="toggle">
        <input type="checkbox" id="invert">
        <div class="toggle-track"></div>
      </label>
    </div>
  </div>

  <!-- ⑥ DISPLAY -->
  <div class="group">
    <div class="group-label">Display</div>
    <div class="control">
      <label>Brightness <span id="v-brightness">1.00</span></label>
      <input type="range" id="brightness" min="0.1" max="2.0" value="1.0" step="0.01">
    </div>
    <div class="control">
      <label>Contrast <span id="v-contrast">1.00</span></label>
      <input type="range" id="contrast" min="0.1" max="3.0" value="1.0" step="0.01">
    </div>
    <div class="control">
      <label>BG hue <span id="v-bghue">0°</span></label>
      <input type="range" id="bghue" min="0" max="360" value="0" step="1">
    </div>
    <div class="control">
      <label>BG sat <span id="v-bgsat">0</span>%</label>
      <input type="range" id="bgsat" min="0" max="100" value="0" step="1">
    </div>
    <div class="control">
      <label>BG lit <span id="v-bglit">4</span>%</label>
      <input type="range" id="bglit" min="0" max="100" value="4" step="1">
    </div>
    <div class="hex-row">
      <input type="color" id="hex-bg" value="#0a0a0a">
      <input type="text"  id="hext-bg" value="#0A0A0A" maxlength="7">
    </div>
  </div>

  <!-- ⑦ NOISE — COLOR -->
  <div class="group color-group">
    <div class="group-label color-label">Noise — Color</div>
    <div class="control">
      <label>Scale <span id="v-cscale">4.0</span></label>
      <input type="range" id="cscale" min="0.5" max="20" value="4" step="0.1">
    </div>
    <div class="control">
      <label>Speed <span id="v-cspeed">0.30</span></label>
      <input type="range" id="cspeed" min="0" max="3" value="0.3" step="0.01">
    </div>
    <div class="control">
      <label>Flow angle <span id="v-cangle">45°</span></label>
      <input type="range" id="cangle" min="0" max="360" value="45" step="1">
    </div>
    <div class="control">
      <label>Base hue <span id="v-basehue">200°</span></label>
      <input type="range" id="basehue" min="0" max="360" value="200" step="1">
    </div>
    <div class="control">
      <label>Hue spread <span id="v-huespread">120°</span></label>
      <input type="range" id="huespread" min="0" max="360" value="120" step="1">
    </div>
    <div class="control">
      <label>Saturation <span id="v-saturation">80</span>%</label>
      <input type="range" id="saturation" min="0" max="100" value="80" step="1">
    </div>
    <div class="control">
      <label>Lightness <span id="v-lightness">60</span>%</label>
      <input type="range" id="lightness" min="20" max="90" value="60" step="1">
    </div>
    <div class="hex-row">
      <input type="color" id="hex-noise" value="#0088ff">
      <input type="text"  id="hext-noise" value="#0088FF" maxlength="7">
    </div>
    <div class="toggle-row">
      Color equalize
      <label class="toggle">
        <input type="checkbox" id="colorequalize">
        <div class="toggle-track"></div>
      </label>
    </div>

    <div class="group-label" style="margin-top:4px">Color band</div>
    <div class="control">
      <label>Low <span id="v-bandlo">0</span>%</label>
      <input type="range" id="bandlo" min="0" max="100" value="0" step="1">
    </div>
    <div class="control">
      <label>High <span id="v-bandhi">100</span>%</label>
      <input type="range" id="bandhi" min="0" max="100" value="100" step="1">
    </div>

    <div class="group-label" style="margin-top:4px">Fallback color</div>
    <div class="control">
      <label>Hue <span id="v-fbhue">0°</span></label>
      <input type="range" id="fbhue" min="0" max="360" value="0" step="1">
    </div>
    <div class="control">
      <label>Saturation <span id="v-fbsat">0</span>%</label>
      <input type="range" id="fbsat" min="0" max="100" value="0" step="1">
    </div>
    <div class="control">
      <label>Lightness <span id="v-fblit">20</span>%</label>
      <input type="range" id="fblit" min="0" max="90" value="20" step="1">
    </div>
    <div class="hex-row">
      <input type="color" id="hex-fb" value="#333333">
      <input type="text"  id="hext-fb" value="#333333" maxlength="7">
    </div>
  </div>

  <!-- ⑧ CURSOR GLOW -->
  <div class="group">
    <div class="group-label">Cursor glow</div>
    <div class="control">
      <label>Radius <span id="v-glowradius">120</span>px</label>
      <input type="range" id="glowradius" min="10" max="800" value="120" step="1">
    </div>
    <div class="control">
      <label>Strength <span id="v-glowstrength">0.80</span></label>
      <input type="range" id="glowstrength" min="0" max="2.0" value="0.8" step="0.01">
    </div>
    <div class="control">
      <label>Falloff <span id="v-glowfalloff">2.00</span></label>
      <input type="range" id="glowfalloff" min="0.5" max="6.0" value="2.0" step="0.1">
    </div>
  </div>

  <!-- ⑨ IMAGE -->
  <div class="group">
    <div class="group-label">Image</div>
    <div id="drop-zone">DROP IMAGE / CLICK</div>
    <input type="file" id="img-file" accept="image/*" style="display:none">
    <div class="control">
      <label>Mix <span id="v-imgmix">0.00</span></label>
      <input type="range" id="imgmix" min="0" max="1" value="0" step="0.01">
    </div>
    <div class="toggle-row">
      Invert image
      <label class="toggle">
        <input type="checkbox" id="imginvert">
        <div class="toggle-track"></div>
      </label>
    </div>
    <button id="btn-clearimg">CLEAR IMAGE</button>
  </div>

  <!-- ⑩ EXPORT -->
  <button id="btn-export">↓ EXPORT PNG</button>

  <button id="btn-pause" class="active">PAUSE</button>
  <button id="btn-reset">RESET TIME</button>

  <div class="fps" id="fps">fps: --</div>
</div>

<div id="output">
  <canvas id="canvas"></canvas>
</div>

<script>
// ── Value noise ──────────────────────────────────────────────
function hash(x, y) {
  const n = Math.sin(x * 127.1 + y * 311.7) * 43758.5453123;
  return n - Math.floor(n);
}
function smoothstep(t) { return t * t * (3 - 2 * t); }
function valueNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const ux = smoothstep(fx), uy = smoothstep(fy);
  const a = hash(ix,   iy),   b = hash(ix+1, iy);
  const c = hash(ix,   iy+1), d = hash(ix+1, iy+1);
  return a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy;
}
function fbm(x, y, octaves, lacunarity, gain) {
  let v = 0, amp = 1, freq = 1, max = 0;
  for (let i = 0; i < octaves; i++) {
    v += valueNoise(x * freq, y * freq) * amp;
    max += amp; amp *= gain; freq *= lacunarity;
  }
  return v / max;
}

// ── State ────────────────────────────────────────────────────
const charsets = {
  dense:  '@#S%?*+;:,. ',
  simple: '#=+-:. ',
  block:  '█▓▒░ ',
  dots:   '●◉◎○◌ ',
  binary: '10 ',
};

const P = {
  // canvas — master
  canvasW: 1920, canvasH: 1080,
  // grid — derived from these two
  cellsize: 24, spacing: 4,
  // shape noise
  scale: 3, octaves: 4, lacunarity: 2.0, gain: 0.5,
  speed: 0.5, angle: 0,
  invert: false, brightness: 1.0, contrast: 1.0,
  charset: charsets.dense,
  // background
  bghue: 0, bgsat: 0, bglit: 4,
  // color noise
  cscale: 4.0, cspeed: 0.3, cangle: 45,
  basehue: 200, huespread: 120,
  saturation: 80, lightness: 60,
  colorequalize: false,
  bandlo: 0, bandhi: 100,
  fbhue: 0, fbsat: 0, fblit: 20,
  // glow
  glowradius: 120, glowstrength: 0.8, glowfalloff: 2.0,
  // image
  imgmix: 0, imginvert: false,
  // font
  fontfamily: 'Courier New',
};

let t = 0, tc = 0, paused = false;
let lastFrame = performance.now(), frameCount = 0, fpsTimer = 0;

// ── Slider bindings ───────────────────────────────────────────
function bind(id, key, fmt) {
  const el  = document.getElementById(id);
  const vEl = document.getElementById('v-' + id);
  el.addEventListener('input', () => {
    P[key] = parseFloat(el.value);
    if (vEl) vEl.textContent = fmt(P[key]);
  });
}

bind('cellsize',    'cellsize',    v => v|0);
bind('spacing',     'spacing',     v => v|0);
bind('scale',       'scale',       v => v.toFixed(1));
bind('octaves',     'octaves',     v => v|0);
bind('lacunarity',  'lacunarity',  v => v.toFixed(1));
bind('gain',        'gain',        v => v.toFixed(2));
bind('speed',       'speed',       v => v.toFixed(2));
bind('angle',       'angle',       v => (v|0) + '°');
bind('brightness',  'brightness',  v => v.toFixed(2));
bind('contrast',    'contrast',    v => v.toFixed(2));
bind('cscale',      'cscale',      v => v.toFixed(1));
bind('cspeed',      'cspeed',      v => v.toFixed(2));
bind('cangle',      'cangle',      v => (v|0) + '°');
bind('basehue',     'basehue',     v => (v|0) + '°');
bind('huespread',   'huespread',   v => (v|0) + '°');
bind('saturation',  'saturation',  v => v|0);
bind('lightness',   'lightness',   v => v|0);
bind('bandlo',      'bandlo',      v => (v|0) + '%');
bind('bandhi',      'bandhi',      v => (v|0) + '%');
bind('fbhue',       'fbhue',       v => (v|0) + '°');
bind('fbsat',       'fbsat',       v => v|0);
bind('fblit',       'fblit',       v => v|0);
bind('glowradius',  'glowradius',  v => v|0);
bind('glowstrength','glowstrength',v => v.toFixed(2));
bind('glowfalloff', 'glowfalloff', v => v.toFixed(2));
bind('imgmix',      'imgmix',      v => v.toFixed(2));

// Canvas size inputs
const outputEl = document.getElementById('output');
function applyCanvasSize() {
  P.canvasW = parseInt(document.getElementById('canvasW').value) || 1920;
  P.canvasH = parseInt(document.getElementById('canvasH').value) || 1080;
  // sync bg colour of surrounding area
  updateBg();
}
document.getElementById('canvasW').addEventListener('change', applyCanvasSize);
document.getElementById('canvasH').addEventListener('change', applyCanvasSize);

// Canvas presets
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const w = parseInt(btn.dataset.w), h = parseInt(btn.dataset.h);
    P.canvasW = w; P.canvasH = h;
    document.getElementById('canvasW').value = w;
    document.getElementById('canvasH').value = h;
    updateBg();
  });
});

// Background (special: also sets surrounding output bg)
function updateBg() {
  outputEl.style.background = `hsl(${P.bghue},${P.bgsat}%,${Math.max(0, P.bglit - 2)}%)`;
}
['bghue','bgsat','bglit'].forEach(id => {
  const el  = document.getElementById(id);
  const vEl = document.getElementById('v-' + id);
  const fmt = id === 'bghue' ? v => (v|0) + '°' : v => v|0;
  el.addEventListener('input', () => {
    P[id] = parseFloat(el.value);
    if (vEl) vEl.textContent = fmt(P[id]);
    updateBg();
  });
});
updateBg();

// Toggles
document.getElementById('invert').addEventListener('change',       e => { P.invert       = e.target.checked; });
document.getElementById('colorequalize').addEventListener('change', e => { P.colorequalize = e.target.checked; });
document.getElementById('imginvert').addEventListener('change',    e => { P.imginvert     = e.target.checked; });

// Charset preset
const presetEl = document.getElementById('charset-preset');
const customEl = document.getElementById('charset-custom');
presetEl.addEventListener('change', () => {
  if (presetEl.value === 'custom') { P.charset = customEl.value || ' .'; }
  else { P.charset = charsets[presetEl.value]; customEl.value = P.charset; }
});
customEl.addEventListener('input', () => { presetEl.value = 'custom'; P.charset = customEl.value || ' .'; });
customEl.value = P.charset;

// Buttons
document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? 'RESUME' : 'PAUSE';
  this.classList.toggle('active', !paused);
});
document.getElementById('btn-reset').addEventListener('click', () => { t = 0; tc = 0; });

// ── Hex ↔ HSL ─────────────────────────────────────────────────
function hexToHsl(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; } else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1-l);
  const f = n => { const k = (n+h/30)%12; const c = l - a*Math.max(-1, Math.min(k-3, 9-k, 1)); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function makeHexGroup(pickerId, textId, hueId, satId, litId, onUpdate) {
  const picker = document.getElementById(pickerId);
  const text   = document.getElementById(textId);
  function fromHex(hex) {
    if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
    const [h, s, l] = hexToHsl(hex);
    const hueEl = document.getElementById(hueId);
    const satEl = document.getElementById(satId);
    const litEl = document.getElementById(litId);
    if (hueEl) { hueEl.value = h; P[hueId] = h; document.getElementById('v-'+hueId).textContent = h+'°'; }
    if (satEl) { satEl.value = s; P[satId] = s; document.getElementById('v-'+satId).textContent = s; }
    if (litEl) { litEl.value = l; P[litId] = l; document.getElementById('v-'+litId).textContent = l; }
    picker.value = hex.toLowerCase();
    text.value   = hex.toUpperCase();
    if (onUpdate) onUpdate();
  }
  function syncFromSliders() {
    const hex = hslToHex(P[hueId]||0, P[satId]||0, P[litId]||0);
    picker.value = hex; text.value = hex.toUpperCase();
  }
  picker.addEventListener('input', () => fromHex(picker.value));
  function applyText() { let v = text.value.trim(); if (!v.startsWith('#')) v='#'+v; if (/^#[0-9a-fA-F]{6}$/.test(v)) fromHex(v); }
  text.addEventListener('blur', applyText);
  text.addEventListener('keydown', e => { if (e.key === 'Enter') applyText(); });
  ;[hueId, satId, litId].forEach(id => { const el = document.getElementById(id); if (el) el.addEventListener('input', syncFromSliders); });
  syncFromSliders();
}
makeHexGroup('hex-noise', 'hext-noise', 'basehue', 'saturation', 'lightness');
makeHexGroup('hex-fb',    'hext-fb',    'fbhue',   'fbsat',       'fblit');
makeHexGroup('hex-bg',    'hext-bg',    'bghue',   'bgsat',        'bglit', updateBg);

// ── Font loader ───────────────────────────────────────────────
const fontInput  = document.getElementById('fontfamily');
const fontStatus = document.getElementById('font-status');
document.getElementById('btn-loadfont').addEventListener('click', async () => {
  const val = fontInput.value.trim();
  if (!val) return;
  if (val.startsWith('http') || val.startsWith('@import')) {
    const url = val.replace(/^@import\s+url\(["']?|["']?\);?$/g, '').trim();
    const existing = document.getElementById('custom-font-link');
    if (existing) existing.remove();
    const link = Object.assign(document.createElement('link'), { id: 'custom-font-link', rel: 'stylesheet', href: url });
    document.head.appendChild(link);
    const m = url.match(/family=([^&:]+)/);
    if (m) { P.fontfamily = decodeURIComponent(m[1].replace(/\+/g,' ')); fontInput.value = P.fontfamily; }
    fontStatus.style.color = '#888'; fontStatus.textContent = 'Loading…';
  } else { P.fontfamily = val; }
  await document.fonts.ready;
  const loaded = document.fonts.check(`16px "${P.fontfamily}", monospace`);
  fontStatus.style.color   = loaded ? '#5a5' : '#a55';
  fontStatus.textContent   = loaded ? `✓ ${P.fontfamily}` : `⚠ not found, using fallback`;
});

// ── Mouse tracking ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let mouseX = -9999, mouseY = -9999;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  // canvas coords: scale from CSS display size → canvas pixel size
  mouseX = (e.clientX - r.left) * (canvas.width  / r.width);
  mouseY = (e.clientY - r.top)  * (canvas.height / r.height);
});
canvas.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

// ── Image input ───────────────────────────────────────────────
let imgPixels = null, imgW = 0, imgH = 0;
const offscreen = document.createElement('canvas');
const offCtx    = offscreen.getContext('2d', { willReadFrequently: true });

function loadImage(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    imgW = img.naturalWidth; imgH = img.naturalHeight;
    offscreen.width = imgW; offscreen.height = imgH;
    offCtx.drawImage(img, 0, 0);
    const data = offCtx.getImageData(0, 0, imgW, imgH).data;
    imgPixels = new Float32Array(imgW * imgH);
    for (let i = 0; i < imgW * imgH; i++) {
      imgPixels[i] = (0.299*data[i*4] + 0.587*data[i*4+1] + 0.114*data[i*4+2]) / 255;
    }
    URL.revokeObjectURL(url);
    dropZone.textContent = file.name;
    dropZone.className   = 'has-image';
  };
  img.src = url;
}

function sampleImage(normX, normY) {
  const imgAspect  = imgW / imgH;
  const gridAspect = P.canvasW / P.canvasH;
  let sx, sy;
  if (imgAspect > gridAspect) {
    const drawn = gridAspect / imgAspect;
    const off   = (1 - drawn) / 2;
    sx = normX; sy = (normY - off) / drawn;
  } else {
    const drawn = imgAspect / gridAspect;
    const off   = (1 - drawn) / 2;
    sx = (normX - off) / drawn; sy = normY;
  }
  if (sx < 0 || sx > 1 || sy < 0 || sy > 1) return 0.5;
  const px = Math.min(Math.floor(sx * imgW), imgW - 1);
  const py = Math.min(Math.floor(sy * imgH), imgH - 1);
  return imgPixels[py * imgW + px];
}

const dropZone = document.getElementById('drop-zone');
const imgFile  = document.getElementById('img-file');
dropZone.addEventListener('click', () => imgFile.click());
imgFile.addEventListener('change', () => { if (imgFile.files[0]) loadImage(imgFile.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});
document.getElementById('btn-clearimg').addEventListener('click', () => {
  imgPixels = null; dropZone.textContent = 'DROP IMAGE / CLICK'; dropZone.className = '';
});

// ── Typed buffers ─────────────────────────────────────────────
let _vals  = new Float32Array(0);
let _cvals = new Float32Array(0);
let _rank  = new Uint32Array(0);
let _crank = new Uint32Array(0);

// ── Render ────────────────────────────────────────────────────
function render() {
  const CW   = P.canvasW | 0;
  const CH   = P.canvasH | 0;
  const chars = P.charset;
  const N     = chars.length - 1;

  // Derive grid from size parameter, then spread evenly to fill canvas exactly
  const cols = Math.max(1, Math.round(CW / P.cellsize));
  const rows = Math.max(1, Math.round(CH / P.cellsize));
  const cellW = CW / cols;
  const cellH = CH / rows;
  const fontSize = Math.max(1, Math.round(Math.min(cellW, cellH) - P.spacing));

  const total = cols * rows;

  // Update grid info label
  const gridInfo = document.getElementById('grid-info');
  if (gridInfo) gridInfo.textContent = `${cols} × ${rows} cells`;

  // Shape noise direction
  const rad = P.angle * Math.PI / 180;
  const dx  = Math.cos(rad), dy = Math.sin(rad);
  const sc  = 1 / P.scale;

  // Color noise direction
  const crad = P.cangle * Math.PI / 180;
  const cdx  = Math.cos(crad), cdy = Math.sin(crad);
  const csc  = 1 / P.cscale;

  // Resize typed buffers if needed
  if (_vals.length < total) {
    _vals  = new Float32Array(total);
    _cvals = new Float32Array(total);
    _rank  = new Uint32Array(total);
    _crank = new Uint32Array(total);
  }

  // 1. Compute noise fields
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const i = r * cols + c;

      // Shape
      const nx = c * sc + dx * t;
      const ny = r * sc * 0.55 + dy * t;
      let v = fbm(nx, ny, P.octaves | 0, P.lacunarity, P.gain);
      v = (v - 0.5) * P.contrast + 0.5;
      v = Math.max(0, Math.min(1, v * P.brightness));
      if (P.invert) v = 1 - v;

      // Image blend
      if (imgPixels && P.imgmix > 0) {
        let lum = sampleImage(c / cols, r / rows);
        if (P.imginvert) lum = 1 - lum;
        v = v * (1 - P.imgmix) + lum * P.imgmix;
      }

      _vals[i] = v; _rank[i] = i;

      // Color
      const cnx = c * csc + cdx * tc + 50.3;
      const cny = r * csc * 0.55 + cdy * tc + 17.7;
      _cvals[i] = fbm(cnx, cny, P.octaves | 0, P.lacunarity, P.gain);
      _crank[i] = i;
    }
  }

  // 2. Equalize shape → charMap
  const rankSlice = _rank.subarray(0, total);
  rankSlice.sort((a, b) => _vals[a] - _vals[b]);
  const charMap = new Uint8Array(total);
  for (let i = 0; i < total; i++) charMap[rankSlice[i]] = Math.min(Math.floor(i / total * (N + 1)), N);

  // 3. Color equalization (optional)
  let hueMap;
  if (P.colorequalize) {
    const crankSlice = _crank.subarray(0, total);
    crankSlice.sort((a, b) => _cvals[a] - _cvals[b]);
    hueMap = new Float32Array(total);
    for (let i = 0; i < total; i++) hueMap[crankSlice[i]] = i / (total - 1);
  } else {
    hueMap = _cvals.subarray(0, total);
  }

  // 4. Resize canvas to defined output size
  if (canvas.width !== CW || canvas.height !== CH) {
    canvas.width  = CW;
    canvas.height = CH;
  }

  // 5. Background
  ctx.fillStyle = `hsl(${P.bghue},${P.bgsat}%,${P.bglit}%)`;
  ctx.fillRect(0, 0, CW, CH);
  ctx.font         = `${fontSize}px "${P.fontfamily}", monospace`;
  ctx.textBaseline = 'top';

  // 6. Draw characters
  const bandLo = P.bandlo / 100;
  const bandHi = P.bandhi / 100;
  const glowR2 = P.glowradius * P.glowradius;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const i  = r * cols + c;
      const ch = chars[charMap[i]];
      if (ch === ' ') continue;

      // Cursor glow
      const cx    = (c + 0.5) * cellW;
      const cy    = (r + 0.5) * cellH;
      const ddx   = cx - mouseX, ddy = cy - mouseY;
      const dist2 = ddx*ddx + ddy*ddy;
      const glow  = dist2 < glowR2
        ? P.glowstrength * Math.pow(1 - dist2 / glowR2, P.glowfalloff)
        : 0;

      // Color
      const hv       = hueMap[i];
      const noiseHue = P.basehue + (hv - 0.5) * P.huespread;
      const inBand   = hv >= bandLo && hv <= bandHi;
      const baseHue  = inBand ? noiseHue : P.fbhue;
      const baseSat  = inBand ? P.saturation : P.fbsat;
      const baseLit  = inBand ? P.lightness  : P.fblit;

      const hue = baseHue + glow * (noiseHue - baseHue);
      const sat = baseSat + glow * (P.saturation - baseSat);
      const lit = baseLit + glow * (P.lightness  - baseLit);

      ctx.fillStyle = `hsl(${hue},${sat}%,${lit}%)`;
      ctx.fillText(ch, c * cellW, r * cellH);
    }
  }
}

// ── Export ────────────────────────────────────────────────────
// Canvas IS the output — just download it directly
document.getElementById('btn-export').addEventListener('click', () => {
  const a    = document.createElement('a');
  a.download = `ascii-noise-${P.canvasW}x${P.canvasH}.png`;
  a.href     = canvas.toDataURL('image/png');
  a.click();
});

// ── Loop ─────────────────────────────────────────────────────
function loop(now) {
  const dt = Math.min((now - lastFrame) / 1000, 0.1);
  lastFrame = now;
  if (!paused) { t += P.speed * dt; tc += P.cspeed * dt; }
  render();
  frameCount++;
  fpsTimer += dt;
  if (fpsTimer >= 0.5) {
    document.getElementById('fps').textContent = 'fps: ' + Math.round(frameCount / fpsTimer);
    frameCount = 0; fpsTimer = 0;
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
